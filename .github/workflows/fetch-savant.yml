name: Fetch Savant Data

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pybaseball savant-extras

      - name: Run Savant fetch script
        run: python scripts/fetch_savant.py

      - name: Commit and push data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Savant data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
